<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A – Регистрация</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container header__container">
            <a href="index.html" class="header__logo">Главная страница</a>
            <div class="header__search">
                <form action="#" method="get" class="header__search-form">
                    <input type="text" name="q" placeholder="Поиск..." class="header__search-input">
                    <button type="submit" class="header__search-button">Найти</button>
                </form>
            </div>
            <div class="header__ask-wrapper">
                <a href="ask.html" class="header__ask-button">Задать вопрос</a>
            </div>
            <div class="header__user-block">
                <div class="header__unauth">
                    <a href="login.html">Вход</a> / <a href="signup.html">Регистрация</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container main__container">
            <div class="main__content">
                <div class="form-container">
                    <h2>Регистрация</h2>
                    <form action="#" method="post" enctype="multipart/form-data">
                        <div class="form__group">
                            <label for="username">Имя пользователя</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="form__group">
                            <label for="email">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="form__group">
                            <label for="password">Пароль</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="form__group">
                            <label for="repeat_password">Повторите пароль</label>
                            <input type="password" class="form-control" id="repeat_password" name="repeat_password" required>
                        </div>
                        <div class="form__group">
                            <label for="avatar">Аватар</label>
                            <input type="file" class="form-control--file" id="avatar" name="avatar" accept="image/*">
                            <small class="form__text">Загрузите изображение (png, jpg, не более 2 МБ).</small>
                        </div>
                        <button type="submit" class="button button--primary button--block">Зарегистрироваться</button>
                        <div class="form__footer">
                            Уже есть аккаунт? <a href="login.html">Войдите</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Q&A. Все права защищены.</p>
        </div>
    </footer>

    <script src="static/js/main.js"></script>
</body>
</html>
